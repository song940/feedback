<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback</title>
  <style>
  *{
    box-sizing: border-box;
  }
  html{
    font-size: 14px;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }
  body{
    margin: 0;
    padding: 0;
    font-size: 1rem;
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji','Segoe UI Symbol';
  }
  .container{
    width: 30%;
    min-width: 20rem;
    margin: auto;
    margin-top: 10%;
  }
  .title{
    color: #363636;
    font-size: 2.75rem;
    font-weight: 300;
    line-height: 1.125;
  }
  h2.title{
    font-size: 1.5rem;
  }

  label {
    display: block;
    color: #363636;
    font-weight: 700;
    margin-bottom: .5em;
  }
  
  .input, .textarea {
    outline: 0;
    width: 100%;
    color: #363636;
    font-size: 1rem;
    height: 2.285em;
    line-height: 1.5;
    padding-left: .75em;
    padding-right: .75em;
    border-radius: 3px;
    border: 1px solid #dbdbdb;
    background-color: #fff;
    box-shadow: inset 0 1px 2px rgba(10,10,10,.1);
  }
  
  .input:hover,.textarea:hover{
    border-color:#b5b5b5;
  }
  
  .input:focus,.textarea:focus{
    border-color:#23d160;
  }
  textarea{
    max-width: 100%;
    max-height: 300px;
    min-height: 120px;
  }
  button{
    color: #fff;
    width: 100%;
    display: block;
    border-radius: 3px;
    background: #23d160;
    font-size: 1rem;
    line-height: 1.5;
    height: 2.285em;
    margin-top: 1rem;
    border: 1px solid #dbdbdb;
  }
  </style>
</head>
<body>
  <main id="main" class="container">
    <h1 class="title">Feedback<span></span></h1>
    <h2 class="title">I appreciate your feedback 🌈</h2>
    <form action="https://formspree.io/song940@gmail.com" method="post">
      <label class="label" for="name">Name</label>
      <input class="input" type="text" name="name">
      <label class="label" for="email">Email*</label>
      <input class="input" type="email" name="email" required>
      <label class="label" for="message">Message*</label>
      <textarea class="textarea" placeholder="Try to be as clear as possible." name="message" minlength="20" required autofocus></textarea>
      <button class="button is-primary is-large" type="submit">Send Feedback</button>
    </form>
  </main>
</body>
</html>
